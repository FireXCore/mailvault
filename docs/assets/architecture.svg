<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
<title id="title">MailVault architecture</title><desc id="desc">Mail providers feed a read-only acquisition layer, canonical evidence archive, derived indexes, and downstream procurement intelligence.</desc>
<rect width="1280" height="720" fill="#FFFFFF"/>
<text x="64" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#0B172A">Architecture</text>
<text x="64" y="94" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" fill="#65758B">Provider-specific transport is isolated from the canonical archive and downstream analytics.</text>

<g font-family="Inter,Segoe UI,Arial,sans-serif">
<rect x="64" y="140" width="220" height="112" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="84" y="174" font-size="18" font-weight="700" fill="#172033">Mail sources</text>
<text x="84" y="204" font-size="15" fill="#65758B">Gmail IMAP</text><text x="84" y="226" font-size="15" fill="#65758B">Generic IMAP</text>

<rect x="360" y="140" width="250" height="112" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="380" y="174" font-size="18" font-weight="700" fill="#172033">Acquisition</text>
<text x="380" y="204" font-size="15" fill="#65758B">Capability negotiation</text><text x="380" y="226" font-size="15" fill="#65758B">UID-based read-only sync</text>

<rect x="686" y="140" width="250" height="112" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="706" y="174" font-size="18" font-weight="700" fill="#172033">Canonical evidence</text>
<text x="706" y="204" font-size="15" fill="#65758B">Immutable raw EML</text><text x="706" y="226" font-size="15" fill="#65758B">Content-addressed blobs</text>

<rect x="1012" y="140" width="204" height="112" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="1032" y="174" font-size="18" font-weight="700" fill="#172033">Derived outputs</text>
<text x="1032" y="204" font-size="15" fill="#65758B">SQLite index</text><text x="1032" y="226" font-size="15" fill="#65758B">JSON / JSONL views</text>

<path d="M284 196h76M610 196h76M936 196h76" stroke="#2B7A78" stroke-width="4" marker-end="url(#arrow)"/>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2B7A78"/></marker></defs>

<rect x="64" y="326" width="1152" height="132" rx="18" fill="#0B172A"/>
<text x="92" y="365" font-size="20" font-weight="700" fill="#FFFFFF">Evidence invariants</text>
<text x="92" y="398" font-size="16" fill="#FFFFFF">Raw bytes remain authoritative. Every MIME part retains its source message, part path, role, hashes and storage location.</text>
<text x="92" y="429" font-size="16" fill="#FFFFFF">Derived metadata is reproducible. Duplicate payloads share one blob while every message occurrence remains independently recorded.</text>

<rect x="64" y="526" width="350" height="124" rx="16" fill="#FFFFFF" stroke="#2B7A78" stroke-width="2"/>
<text x="86" y="562" font-size="18" font-weight="700" fill="#172033">Archive operations</text>
<text x="86" y="592" font-size="15" fill="#65758B">Integrity verification</text><text x="86" y="616" font-size="15" fill="#65758B">Resumable synchronization</text>

<rect x="465" y="526" width="350" height="124" rx="16" fill="#FFFFFF" stroke="#2B7A78" stroke-width="2"/>
<text x="487" y="562" font-size="18" font-weight="700" fill="#172033">Evidence manifests</text>
<text x="487" y="592" font-size="15" fill="#65758B">Messages, occurrences and MIME parts</text><text x="487" y="616" font-size="15" fill="#65758B">Procurement source anchors</text>

<rect x="866" y="526" width="350" height="124" rx="16" fill="#FFFFFF" stroke="#2B7A78" stroke-width="2"/>
<text x="888" y="562" font-size="18" font-weight="700" fill="#172033">Downstream systems</text>
<text x="888" y="592" font-size="15" fill="#65758B">eDiscovery and analytics</text><text x="888" y="616" font-size="15" fill="#65758B">RMS procurement intelligence</text>
</g>
</svg>