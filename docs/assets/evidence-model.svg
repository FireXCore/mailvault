<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
<title id="title">MailVault evidence model</title><desc id="desc">A canonical message links to mailbox occurrences, participants, MIME parts, and deduplicated blobs.</desc>
<rect width="1280" height="640" fill="#FFFFFF"/>
<text x="64" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="32" font-weight="700" fill="#0B172A">Evidence model</text>
<g font-family="Inter,Segoe UI,Arial,sans-serif">
<rect x="476" y="132" width="328" height="116" rx="18" fill="#0B172A"/>
<text x="508" y="174" font-size="21" font-weight="700" fill="#FFFFFF">Canonical message</text>
<text x="508" y="205" font-size="15" fill="#FFFFFF">raw SHA-256 · RFC Message-ID · provider identity</text>

<rect x="70" y="342" width="250" height="118" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="92" y="380" font-size="18" font-weight="700" fill="#172033">Occurrences</text>
<text x="92" y="410" font-size="15" fill="#65758B">mailbox · UIDVALIDITY · UID</text><text x="92" y="434" font-size="15" fill="#65758B">flags · labels · internal date</text>

<rect x="374" y="342" width="250" height="118" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="396" y="380" font-size="18" font-weight="700" fill="#172033">Participants</text>
<text x="396" y="410" font-size="15" fill="#65758B">from · sender · reply-to</text><text x="396" y="434" font-size="15" fill="#65758B">to · cc · bcc · domains</text>

<rect x="678" y="342" width="250" height="118" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="700" y="380" font-size="18" font-weight="700" fill="#172033">MIME parts</text>
<text x="700" y="410" font-size="15" fill="#65758B">part path · role · filename</text><text x="700" y="434" font-size="15" fill="#65758B">declared/detected MIME · defects</text>

<rect x="982" y="342" width="228" height="118" rx="16" fill="#EAF0F6" stroke="#5B708A" stroke-width="2"/>
<text x="1004" y="380" font-size="18" font-weight="700" fill="#172033">Blobs</text>
<text x="1004" y="410" font-size="15" fill="#65758B">SHA-256 · size</text><text x="1004" y="434" font-size="15" fill="#65758B">content-addressed path</text>

<path d="M560 248L228 342M602 248L500 342M678 248L802 342M734 248L1085 342" stroke="#2B7A78" stroke-width="3" fill="none"/>

<rect x="202" y="520" width="876" height="68" rx="14" fill="#FFFFFF" stroke="#2B7A78" stroke-width="2"/>
<text x="232" y="551" font-size="16" font-weight="700" fill="#172033">Stable evidence anchor</text>
<text x="232" y="576" font-size="14" fill="#65758B">message archive ID + raw hash + MIME part path + blob hash + exact source metadata</text>
</g></svg>