name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }} quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint
        run: python -m ruff check src tests scripts

      - name: Check formatting
        run: python -m ruff format --check src tests scripts

      - name: Type check
        run: python -m mypy src

      - name: Test
        run: python -m pytest --cov=firexcore_mailvault --cov-report=term-missing

      - name: Validate repository release contract
        run: python scripts/release_check.py

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

  platform-smoke:
    name: ${{ matrix.os }} smoke test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel
        shell: bash
        run: python -m pip install dist/*.whl

      - name: Verify command entry points
        run: |
          mailvault version
          python -m firexcore_mailvault version
          mailvault --help
