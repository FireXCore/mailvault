version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: "build"
    groups:
      python-runtime:
        dependency-type: production
      python-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "build"
