changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Security
      labels: [security]
    - title: Added
      labels: [enhancement, feature]
    - title: Fixed
      labels: [bug, fix]
    - title: Documentation
      labels: [documentation]
    - title: Maintenance
      labels: [dependencies, build, refactor]
    - title: Other changes
      labels: ["*"]
