name: Feature request
description: Propose a provider, protocol, archive or evidence capability.
title: "feature: "
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the operational problem rather than only the proposed implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - IMAP protocol
        - Provider profile
        - Authentication
        - Archive format
        - MIME parsing
        - Integrity and operations
        - Export and integration
        - Procurement evidence
        - Documentation
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Standards or provider documentation
      description: Include public standards or official provider documentation where applicable.

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and evidence impact
      description: Explain effects on raw evidence, schema, providers, resume behavior and existing archives.
