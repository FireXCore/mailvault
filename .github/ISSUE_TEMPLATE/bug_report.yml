name: Bug report
description: Report a reproducible defect without including private mail content.
title: "bug: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste passwords, App Passwords, raw messages, private headers, real addresses, logs containing sensitive data, or attachments. Use synthetic fixtures.

  - type: input
    id: version
    attributes:
      label: MailVault version
      placeholder: 2.0.6
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python and operating system
      placeholder: Python 3.13.5, Windows 11
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Provider profile and server
      placeholder: Gmail IMAP / imap.gmail.com
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Sanitized command or configuration
      render: shell
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized output
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, personal data, real message content and confidential attachments.
          required: true
